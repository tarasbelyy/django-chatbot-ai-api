services:
  app:
    image: django_app
    env_file:
      - .env
    build:
      context: .
      network: host
    ports:
      - "8000:8000"
    depends_on:
      app-postgres:
        condition: service_healthy
    networks:
      - backend
  app-postgres:
    image: postgres:15-alpine
    volumes:
      - app-postgres:/var/lib/postgresql/data
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 1s
      timeout: 5s
      retries: 10
    networks:
      - backend

volumes:
  app-postgres:
    name: app-postgres

networks:
  backend:
    name: backend
    driver: bridge
